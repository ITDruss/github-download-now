<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GitHub Download Now</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <header class="header">
      <img src="icons/icon-48.png" width="36" height="36" alt="">
      <div class="brand"><h1>GitHub Download Now</h1><p id="version"></p></div>
      <label class="switch" title="Enable extension"><input id="enabled" type="checkbox"><span></span></label>
    </header>

    <nav class="tabs" aria-label="Sections">
      <button class="tab active" data-tab="updates" type="button"><span id="updatesTabLabel"></span><b id="updatesCount" hidden></b></button>
      <button class="tab" data-tab="tracking" type="button"><span id="trackingTabLabel"></span><b id="trackingCount" hidden></b></button>
      <button class="tab" data-tab="history" type="button"><span id="historyTabLabel"></span></button>
      <button class="tab" data-tab="settings" type="button"><span id="settingsTabLabel"></span></button>
    </nav>

    <section class="panel active" data-panel="updates">
      <div class="panel-head"><div><h2 id="updatesTitle"></h2><p id="lastChecked"></p></div><button id="checkNow" class="small-button" type="button"></button></div>
      <div id="updatesList" class="item-list"></div>
    </section>

    <section class="panel" data-panel="tracking">
      <div class="panel-head"><div><h2 id="trackingTitle"></h2><p id="trackingNote"></p></div></div>
      <div id="trackingList" class="item-list"></div>
    </section>

    <section class="panel" data-panel="history">
      <div class="panel-head"><div><h2 id="historyTitle"></h2><p id="historyNote"></p></div><button id="clearHistory" class="text-button" type="button"></button></div>
      <div id="historyList" class="item-list"></div>
    </section>

    <section class="panel" data-panel="settings">
      <section class="detected"><span id="detectedLabel"></span><strong id="detectedPlatform">—</strong></section>
      <label class="field"><span id="formatLabel"></span><select id="preferredFormat"></select></label>
      <label class="field"><span id="actionLabel"></span><select id="primaryAction"><option value="download"></option><option value="menu"></option><option value="release"></option></select></label>
      <label class="field"><span id="afterDownloadLabel"></span><select id="afterDownload"><option value="ask"></option><option value="always"></option><option value="never"></option></select></label>
      <label class="field"><span id="intervalLabel"></span><select id="updateCheckInterval"><option value="manual"></option><option value="6h"></option><option value="24h"></option><option value="72h"></option><option value="168h"></option></select></label>
      <div class="quick-checks">
        <label><input id="notificationsEnabled" type="checkbox"><span id="notificationsLabel"></span></label>
        <label><input id="badgeEnabled" type="checkbox"><span id="badgeLabel"></span></label>
        <label><input id="historyEnabled" type="checkbox"><span id="historyEnabledLabel"></span></label>
      </div>
      <button id="openOptions" class="options-button" type="button"></button>
    </section>

    <div id="status" class="status" aria-live="polite"></div>
  </main>
  <script src="settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>

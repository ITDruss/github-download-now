name: Bug report
description: Report a wrong asset selection or interface problem
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: repository
    attributes:
      label: GitHub repository
      placeholder: https://github.com/owner/repository
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: OS and architecture
      placeholder: Debian 13, x86-64
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected asset
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

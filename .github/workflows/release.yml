name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Verify release tag
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${VERSION}" >&2
            exit 1
          fi
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high
      - run: npm test
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m playwright install --with-deps chromium
      - run: npm run test:ui
      - name: Verify reproducible browser packages
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          npm run verify:reproducible
      - run: npm run lint:firefox
      - name: Prepare source archive and checksums
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          git archive \
            --format=zip \
            --prefix="github-download-now-v${VERSION}/" \
            --output="github-download-now-source-v${VERSION}.zip" \
            HEAD
          sha256sum \
            "github-download-now-chromium-v${VERSION}.zip" \
            "github-download-now-firefox-v${VERSION}.zip" \
            "github-download-now-source-v${VERSION}.zip" \
            > "SHA256SUMS-v${VERSION}.txt"
          node scripts/release-notes.mjs "${VERSION}" > release-notes.md
          test -s release-notes.md
      - name: Generate build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            github-download-now-chromium-v*.zip
            github-download-now-firefox-v*.zip
            github-download-now-source-v*.zip
            SHA256SUMS-v*.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          gh release create "${GITHUB_REF_NAME}" \
            "github-download-now-chromium-v${VERSION}.zip" \
            "github-download-now-firefox-v${VERSION}.zip" \
            "github-download-now-source-v${VERSION}.zip" \
            "SHA256SUMS-v${VERSION}.txt" \
            --notes-file release-notes.md \
            --verify-tag \
            --title "GitHub Download Now ${GITHUB_REF_NAME}"

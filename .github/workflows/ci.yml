name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package
      - uses: actions/upload-artifact@v7
        with:
          name: browser-builds
          path: |
            github-download-now-chromium.zip
            github-download-now-firefox.zip
